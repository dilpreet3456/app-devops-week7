version: 0.0
os: linux

files:
  - source: index.html
    destination: /var/www/html

hooks:
  BeforeInstall:
    - location: scripts/install.sh
      timeout: 300

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 300
      
  ValidateService:
    - location: scripts/validate.sh
      timeout: 300
      runas: root
